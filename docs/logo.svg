<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Auralis logo">
  <defs>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="45%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="auroraV" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0b0b12"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#1b1b28" stroke-width="2"/>
  <circle cx="256" cy="232" r="180" fill="url(#halo)"/>

  <!-- aurora ring -->
  <circle cx="256" cy="232" r="150" fill="none" stroke="url(#aurora)" stroke-width="10" opacity="0.9"/>
  <circle cx="256" cy="232" r="150" fill="none" stroke="#0b0b12" stroke-width="2" stroke-dasharray="2 22"/>

  <!-- radial spectrum bars forming a waveform inside the ring -->
  <g stroke="url(#auroraV)" stroke-width="12" stroke-linecap="round" filter="url(#glow)">
    <line x1="120" y1="232" x2="150" y2="232"/>
    <line x1="150" y1="232" x2="150" y2="232"/>
    <line x1="142" y1="270" x2="142" y2="194"/>
    <line x1="168" y1="292" x2="168" y2="172"/>
    <line x1="194" y1="258" x2="194" y2="206"/>
    <line x1="220" y1="308" x2="220" y2="156"/>
    <line x1="246" y1="332" x2="246" y2="132"/>
    <line x1="272" y1="288" x2="272" y2="176"/>
    <line x1="298" y1="320" x2="298" y2="144"/>
    <line x1="324" y1="262" x2="324" y2="202"/>
    <line x1="350" y1="296" x2="350" y2="168"/>
    <line x1="376" y1="270" x2="376" y2="194"/>
    <line x1="392" y1="232" x2="392" y2="232"/>
  </g>
  <!-- baseline through center -->
  <line x1="118" y1="232" x2="394" y2="232" stroke="url(#aurora)" stroke-width="3" opacity="0.5"/>

  <!-- wordmark -->
  <text x="256" y="452" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="58" letter-spacing="10" fill="#f5f5fa">AURALIS</text>
  <text x="256" y="484" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="17" letter-spacing="6" fill="#8b8ba7">MIX · MASTER · VOICE</text>
</svg>
